<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobChat - Private Messaging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .login-section {
            padding: 30px;
            text-align: center;
        }
        
        .login-section input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .login-section button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
            display: none;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 80%;
        }
        
        .message.own {
            margin-left: auto;
        }
        
        .message-content {
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message.other .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-info {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            padding: 0 5px;
        }
        
        .message.own .message-info {
            text-align: right;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: none;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        .input-area button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .user-tag {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>BobChat</h1>
            <p>Private 2-Person Messaging</p>
        </div>
        
        <div class="login-section" id="loginSection">
            <h2>Welcome!</h2>
            <p style="margin: 15px 0; color: #666;">Enter your name to start chatting</p>
            <input type="text" id="usernameInput" placeholder="Your name..." maxlength="20">
            <button onclick="joinChat()">Start Chatting</button>
        </div>
        
        <div class="messages-area" id="messagesArea"></div>
        
        <div class="input-area" id="inputArea">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let username;
        let messagesArea = document.getElementById('messagesArea');
        let messageInput = document.getElementById('messageInput');
        let lastMessageCount = 0;
        
        function joinChat() {
            username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Please enter your name!');
                return;
            }
            
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('messagesArea').style.display = 'block';
            document.getElementById('inputArea').style.display = 'block';
            
            loadMessages();
            // Poll for new messages every 2 seconds
            setInterval(loadMessages, 2000);
            
            messageInput.focus();
        }
        
        function loadMessages() {
            fetch('/api/messages')
                .then(response => response.json())
                .then(messages => {
                    if (messages.length !== lastMessageCount) {
                        messagesArea.innerHTML = '';
                        messages.forEach(msg => displayMessage(msg));
                        lastMessageCount = messages.length;
                        scrollToBottom();
                    }
                });
        }
        
        function sendMessage() {
            let message = messageInput.value.trim();
            if (!message) return;
            
            fetch('/api/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: username,
                    message: message
                })
            })
            .then(response => response.json())
            .then(data => {
                messageInput.value = '';
                loadMessages();
            });
        }
        
        function displayMessage(data) {
            let messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (data.username === username ? 'own' : 'other');
            
            let isOwn = data.username === username;
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${!isOwn ? '<span class="user-tag">' + escapeHtml(data.username) + ':</span><br>' : ''}
                    ${escapeHtml(data.message)}
                </div>
                <div class="message-info">${data.timestamp || ''}</div>
            `;
            
            messagesArea.appendChild(messageDiv);
        }
        
        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        document.getElementById('usernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                joinChat();
            }
        });
    </script>
</body>
</html>

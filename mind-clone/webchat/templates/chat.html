<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Chat - Arsh & Bob</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .user-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .user-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .user-btn.arsh {
            background: #3498db;
            color: white;
        }
        
        .user-btn.bob {
            background: #e74c3c;
            color: white;
        }
        
        .user-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .user-btn.active {
            box-shadow: 0 0 0 3px rgba(0,0,0,0.2);
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.arsh {
            flex-direction: row;
        }
        
        .message.bob {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin: 0 10px;
            flex-shrink: 0;
        }
        
        .message-content {
            max-width: 70%;
        }
        
        .message-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            color: white;
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
            text-align: right;
        }
        
        .message.arsh .message-time {
            text-align: left;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .message-input:focus {
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .current-user-display {
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            color: #666;
            background: #e8e8e8;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 Flask Chat App</h1>
            <p>Arsh & Bob's Chat Room</p>
        </div>
        
        {% if not current_user %}
        <div class="user-selector">
            <button class="user-btn arsh" onclick="selectUser('Arsh')">👤 Arsh</button>
            <button class="user-btn bob" onclick="selectUser('Bob')">👤 Bob</button>
        </div>
        {% else %}
        <div class="current-user-display">
            Chatting as: <strong style="color: {{ users[current_user].color }}">{{ current_user }}</strong>
            <a href="/" style="margin-left: 20px; color: #666;">(Switch User)</a>
        </div>
        {% endif %}
        
        <div class="messages-container" id="messages">
            <div class="empty-state">No messages yet. Start the conversation!</div>
        </div>
        
        <div class="input-area">
            <input type="text" 
                   class="message-input" 
                   id="messageInput" 
                   placeholder="{% if current_user %}Type your message...{% else %}Select a user first...{% endif %}"
                   {% if not current_user %}disabled{% endif %}
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" 
                    id="sendBtn"
                    {% if not current_user %}disabled{% endif %}
                    onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let currentUser = '{{ current_user }}';
        let lastMessageId = 0;
        
        const userColors = {
            'Arsh': '#3498db',
            'Bob': '#e74c3c'
        };
        
        function selectUser(username) {
            window.location.href = '/login/' + username;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !currentUser) return;
            
            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: currentUser,
                        message: message
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    loadMessages();
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }
        
        function createMessageElement(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.username.toLowerCase()}`;
            div.innerHTML = `
                <div class="message-avatar" style="background: ${msg.color}">
                    ${msg.username[0]}
                </div>
                <div class="message-content">
                    <div class="message-bubble" style="background: ${msg.color}">
                        ${escapeHtml(msg.message)}
                    </div>
                    <div class="message-time">${msg.username} • ${msg.timestamp}</div>
                </div>
            `;
            return div;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadMessages() {
            try {
                const response = await fetch('/messages?last_id=' + lastMessageId);
                const data = await response.json();
                
                if (data.messages && data.messages.length > 0) {
                    const container = document.getElementById('messages');
                    
                    // Clear empty state on first message
                    if (lastMessageId === 0) {
                        container.innerHTML = '';
                    }
                    
                    data.messages.forEach(msg => {
                        container.appendChild(createMessageElement(msg));
                        lastMessageId = msg.id;
                    });
                    
                    container.scrollTop = container.scrollHeight;
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }
        
        // Poll for new messages every 2 seconds
        setInterval(loadMessages, 2000);
        
        // Load initial messages
        loadMessages();
    </script>
</body>
</html>
